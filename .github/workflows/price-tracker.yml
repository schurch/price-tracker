name: Price Tracker

on:
  workflow_dispatch:
    inputs:
      send_test_whatsapp:
        description: "Send a WhatsApp test message"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "0 19 * * *"
    - cron: "0 20 * * *"

concurrency:
  group: price-tracker
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  track:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Skip if not 8 AM New Zealand time
        id: nz_time
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Manual run detected, bypassing NZ time check."
            exit 0
          fi
          hour="$(TZ=Pacific/Auckland date +%H)"
          if [ "$hour" != "08" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Current Pacific/Auckland hour is $hour, skipping."
            exit 0
          fi
          echo "run=true" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.nz_time.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        if: steps.nz_time.outputs.run == 'true'
        run: python -m pip install -r requirements.txt

      - name: Run tracker
        if: steps.nz_time.outputs.run == 'true'
        env:
          STRICT_FAILURES: "false"
        run: python tracker.py

      - name: Create or update rolling price alert issue
        if: steps.nz_time.outputs.run == 'true' && hashFiles('price-drop.md') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('price-drop.md', 'utf8');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const label = 'price-alert';
            const title = 'Rolling Price Alerts';

            const { data: labels } = await github.rest.issues.listLabelsForRepo({
              owner,
              repo,
            });
            if (!labels.some((item) => item.name === label)) {
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: label,
                color: 'd73a4a',
                description: 'Automated price drop notifications',
              });
            }

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: label,
              per_page: 1,
            });

            if (issues.length === 0) {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                labels: [label],
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issues[0].number,
                body,
              });
            }

      - name: Create WhatsApp test message
        if: steps.nz_time.outputs.run == 'true' && github.event.inputs.send_test_whatsapp == 'true'
        shell: bash
        run: |
          cat <<'EOF' > price-drop-whatsapp.txt
          Price Tracker WhatsApp test

          This is a manual test message from GitHub Actions.
          Triggered at: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Repository: ${{ github.repository }}
          EOF

      - name: Send WhatsApp price alert
        if: steps.nz_time.outputs.run == 'true' && hashFiles('price-drop-whatsapp.txt') != ''
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_WHATSAPP_FROM: ${{ secrets.TWILIO_WHATSAPP_FROM }}
          TWILIO_WHATSAPP_TO: ${{ secrets.TWILIO_WHATSAPP_TO }}
        shell: bash
        run: |
          if [ -z "$TWILIO_ACCOUNT_SID" ] || [ -z "$TWILIO_AUTH_TOKEN" ] || [ -z "$TWILIO_WHATSAPP_FROM" ] || [ -z "$TWILIO_WHATSAPP_TO" ]; then
            echo "Twilio WhatsApp secrets are not fully configured, skipping."
            exit 0
          fi
          body="$(cat price-drop-whatsapp.txt)"
          curl --fail --silent --show-error \
            -u "$TWILIO_ACCOUNT_SID:$TWILIO_AUTH_TOKEN" \
            --data-urlencode "From=$TWILIO_WHATSAPP_FROM" \
            --data-urlencode "To=$TWILIO_WHATSAPP_TO" \
            --data-urlencode "Body=$body" \
            "https://api.twilio.com/2010-04-01/Accounts/$TWILIO_ACCOUNT_SID/Messages.json"

      - name: Commit history changes
        if: steps.nz_time.outputs.run == 'true' && always()
        run: |
          if git diff --quiet -- history.json; then
            echo "No history changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add history.json
          git commit -m "Update tracked prices"
          git push
