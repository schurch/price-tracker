<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Price Tracker Dashboard</title>
  <meta name="color-scheme" content="light dark">
  <style>
    :root {
      --bg: #f3efe7;
      --bg-accent: rgba(212, 162, 79, 0.18);
      --panel: rgba(255, 252, 247, 0.88);
      --panel-strong: rgba(255, 255, 255, 0.96);
      --border: rgba(102, 74, 37, 0.14);
      --text: #1f1a17;
      --muted: #6d6257;
      --highlight: #ab5f16;
      --highlight-soft: rgba(171, 95, 22, 0.14);
      --good: #0d7a5f;
      --graph: #d97706;
      --graph-fill: rgba(217, 119, 6, 0.18);
      --shadow: 0 20px 50px rgba(79, 50, 20, 0.12);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #11151b;
        --bg-accent: rgba(74, 163, 255, 0.18);
        --panel: rgba(20, 27, 36, 0.9);
        --panel-strong: rgba(26, 34, 44, 0.96);
        --border: rgba(146, 168, 194, 0.18);
        --text: #eef4fb;
        --muted: #9bb0c5;
        --highlight: #66b3ff;
        --highlight-soft: rgba(102, 179, 255, 0.16);
        --good: #4fd1a5;
        --graph: #66b3ff;
        --graph-fill: rgba(102, 179, 255, 0.16);
        --shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Helvetica Neue", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, var(--bg-accent), transparent 28rem),
        radial-gradient(circle at top right, rgba(16, 185, 129, 0.08), transparent 22rem),
        linear-gradient(180deg, var(--bg), color-mix(in srgb, var(--bg) 82%, #000 18%));
    }

    a {
      color: inherit;
    }

    .shell {
      width: min(1120px, calc(100vw - 2rem));
      margin: 0 auto;
      padding: 1.25rem 0 3rem;
    }

    .hero {
      padding: 1.25rem;
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      background: linear-gradient(145deg, var(--panel-strong), var(--panel));
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 3.2rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
    }

    .hero p {
      margin: 0.85rem 0 0;
      max-width: 42rem;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.5;
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(9rem, 1fr));
      gap: 0.75rem;
      margin-top: 1.4rem;
    }

    .hero-stat {
      padding: 0.95rem 1rem;
      border-radius: 1rem;
      background: var(--highlight-soft);
      border: 1px solid var(--border);
    }

    .hero-stat-label {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .hero-stat-value {
      display: block;
      margin-top: 0.35rem;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .status {
      margin-top: 1rem;
      padding: 0.95rem 1rem;
      border-radius: 1rem;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.05);
      color: var(--muted);
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 0.9rem;
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 1rem;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.04));
    }

    .control {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      min-width: 0;
    }

    .control label {
      color: var(--muted);
      font-size: 0.74rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 700;
    }

    .control select {
      width: 100%;
      padding: 0.75rem 0.85rem;
      border-radius: 0.85rem;
      border: 1px solid var(--border);
      background: var(--panel-strong);
      color: var(--text);
      font: inherit;
    }

    .group-stack {
      display: grid;
      gap: 1.25rem;
      margin-top: 1rem;
    }

    .group-section {
      display: grid;
      gap: 0.85rem;
    }

    .group-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 1rem;
      padding: 0 0.2rem;
    }

    .group-title {
      margin: 0;
      font-size: 1rem;
      letter-spacing: -0.02em;
    }

    .group-meta {
      color: var(--muted);
      font-size: 0.82rem;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }

    .card {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 1rem;
      border-radius: 1.35rem;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, var(--panel-strong), var(--panel));
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.8rem;
    }

    .card h2 {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.25;
    }

    .pill {
      flex-shrink: 0;
      padding: 0.42rem 0.7rem;
      border-radius: 999px;
      background: var(--highlight-soft);
      color: var(--highlight);
      font-size: 0.78rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.75rem;
    }

    .stat {
      padding: 0.85rem 0.9rem;
      border-radius: 1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
    }

    .stat-label {
      display: block;
      color: var(--muted);
      font-size: 0.74rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stat-value {
      display: block;
      margin-top: 0.35rem;
      font-size: 1.35rem;
      font-weight: 700;
    }

    .trend {
      color: var(--good);
      font-weight: 700;
      font-size: 0.86rem;
    }

    .graph-wrap {
      padding: 0.75rem;
      border-radius: 1rem;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.04);
    }

    .graph-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.55rem;
      color: var(--muted);
      font-size: 0.8rem;
    }

    svg {
      display: block;
      width: 100%;
      height: auto;
      overflow: visible;
    }

    .meta {
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.45;
    }

    .meta a {
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.18em;
    }

    .empty {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 1rem;
      border: 1px dashed var(--border);
      color: var(--muted);
      text-align: center;
    }

    .error {
      color: #b42318;
    }

    @media (prefers-color-scheme: dark) {
      .error {
        color: #ff9b8c;
      }
    }

    @media (max-width: 640px) {
      .shell {
        width: min(100vw - 1rem, 100%);
        padding-top: 0.5rem;
      }

      .hero,
      .card {
        border-radius: 1.1rem;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .card-top {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1>Tracked Price History</h1>
      <p>Current prices, lowest observed prices, and quick trend lines for every tracked item. This page loads its data directly from <code>history.json</code>.</p>
      <div class="hero-stats" id="hero-stats"></div>
      <div class="status" id="status">Loading history…</div>
      <div class="controls" id="controls" hidden>
        <div class="control">
          <label for="group-by">Group by</label>
          <select id="group-by">
            <option value="none">No grouping</option>
            <option value="currency">Currency</option>
            <option value="store">Store</option>
            <option value="price-state">Price state</option>
          </select>
        </div>
        <div class="control">
          <label for="sort-by">Sort by</label>
          <select id="sort-by">
            <option value="name">Name</option>
            <option value="current-price-desc">Current price, high to low</option>
            <option value="current-price-asc">Current price, low to high</option>
            <option value="lowest-price-asc">Lowest price, low to high</option>
            <option value="gap-desc">Distance from low</option>
            <option value="recent">Most recently checked</option>
            <option value="history-desc">Most data points</option>
          </select>
        </div>
      </div>
    </section>
    <section class="group-stack" id="product-groups"></section>
    <div class="empty" id="empty-state" hidden>No successful price history is available yet.</div>
  </main>
  <script>
    const heroStats = document.getElementById("hero-stats");
    const controls = document.getElementById("controls");
    const productGroups = document.getElementById("product-groups");
    const emptyState = document.getElementById("empty-state");
    const status = document.getElementById("status");
    const groupBySelect = document.getElementById("group-by");
    const sortBySelect = document.getElementById("sort-by");

    const uiState = {
      payload: null,
      groupBy: "none",
      sortBy: "name"
    };

    function parsePrice(value) {
      const parsed = Number.parseFloat(value);
      return Number.isFinite(parsed) ? parsed : null;
    }

    function formatMoney(value, currency) {
      try {
        return new Intl.NumberFormat(undefined, {
          style: "currency",
          currency: currency || "NZD",
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        }).format(value);
      } catch (error) {
        return `${value.toFixed(2)} ${currency || ""}`.trim();
      }
    }

    function formatDate(value) {
      if (!value) {
        return "Unknown";
      }
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return value;
      }
      return new Intl.DateTimeFormat(undefined, {
        dateStyle: "medium",
        timeStyle: "short"
      }).format(date);
    }

    function parseTimestamp(value) {
      const timestamp = Date.parse(value || "");
      return Number.isFinite(timestamp) ? timestamp : 0;
    }

    function extractStoreLabel(url) {
      try {
        const { hostname } = new URL(url);
        return hostname.replace(/^www\./, "") || "Unknown store";
      } catch (error) {
        return "Unknown store";
      }
    }

    function buildSparkline(points) {
      const width = 320;
      const height = 120;
      const inset = 12;
      const values = points.map((point) => point.priceValue);
      const min = Math.min(...values);
      const max = Math.max(...values);
      const spread = max - min || 1;

      const coords = points.map((point, index) => {
        const x = inset + ((width - inset * 2) * index) / Math.max(points.length - 1, 1);
        const y = height - inset - ((point.priceValue - min) / spread) * (height - inset * 2);
        return [x, y];
      });

      const path = coords.map(([x, y], index) => `${index === 0 ? "M" : "L"}${x.toFixed(2)} ${y.toFixed(2)}`).join(" ");
      const area = `${path} L ${coords[coords.length - 1][0].toFixed(2)} ${(height - inset).toFixed(2)} L ${coords[0][0].toFixed(2)} ${(height - inset).toFixed(2)} Z`;
      const current = coords[coords.length - 1];

      return `
        <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="Price history chart">
          <path d="${area}" fill="var(--graph-fill)"></path>
          <path d="${path}" fill="none" stroke="var(--graph)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>
          <circle cx="${current[0].toFixed(2)}" cy="${current[1].toFixed(2)}" r="5.5" fill="var(--graph)"></circle>
        </svg>
      `;
    }

    function buildPayload(history) {
      const products = Object.entries(history.products || {}).map(([name, entries]) => {
        const successful = entries
          .filter((entry) => entry.status === "ok")
          .map((entry) => {
            const priceValue = parsePrice(entry.price);
            if (priceValue === null) {
              return null;
            }
            return {
              checkedAt: entry.checked_at || "",
              priceValue,
              priceText: entry.price,
              url: entry.url || "",
              currency: entry.currency || "NZD"
            };
          })
          .filter(Boolean);

        if (!successful.length) {
          return null;
        }

        const current = successful[successful.length - 1];
        const values = successful.map((entry) => entry.priceValue);

        return {
          name,
          url: current.url,
          store: extractStoreLabel(current.url),
          currency: current.currency,
          currentPriceValue: current.priceValue,
          lowestPriceValue: Math.min(...values),
          highestPriceValue: Math.max(...values),
          gapFromLowValue: current.priceValue - Math.min(...values),
          isAtLowestPrice: Math.abs(current.priceValue - Math.min(...values)) < 0.001,
          entryCount: successful.length,
          lastCheckedAt: current.checkedAt,
          lastCheckedAtValue: parseTimestamp(current.checkedAt),
          entries: successful
        };
      }).filter(Boolean);

      const latestCheckedAt = products
        .map((product) => product.lastCheckedAt)
        .filter(Boolean)
        .sort()
        .at(-1);

      return {
        productCount: products.length,
        latestCheckedAt,
        products
      };
    }

    function getGroupLabel(product, groupBy) {
      switch (groupBy) {
        case "currency":
          return product.currency || "Unspecified currency";
        case "store":
          return product.store;
        case "price-state":
          return product.isAtLowestPrice ? "At lowest tracked price" : "Above lowest tracked price";
        default:
          return "All products";
      }
    }

    function compareProducts(left, right, sortBy) {
      switch (sortBy) {
        case "current-price-desc":
          return right.currentPriceValue - left.currentPriceValue || left.name.localeCompare(right.name);
        case "current-price-asc":
          return left.currentPriceValue - right.currentPriceValue || left.name.localeCompare(right.name);
        case "lowest-price-asc":
          return left.lowestPriceValue - right.lowestPriceValue || left.name.localeCompare(right.name);
        case "gap-desc":
          return right.gapFromLowValue - left.gapFromLowValue || left.name.localeCompare(right.name);
        case "recent":
          return right.lastCheckedAtValue - left.lastCheckedAtValue || left.name.localeCompare(right.name);
        case "history-desc":
          return right.entryCount - left.entryCount || left.name.localeCompare(right.name);
        case "name":
        default:
          return left.name.localeCompare(right.name);
      }
    }

    function buildGroups(products, groupBy) {
      const grouped = new Map();
      for (const product of products) {
        const label = getGroupLabel(product, groupBy);
        if (!grouped.has(label)) {
          grouped.set(label, []);
        }
        grouped.get(label).push(product);
      }
      return [...grouped.entries()].map(([label, items]) => ({ label, items }));
    }

    function compareGroups(left, right, groupBy) {
      if (groupBy === "price-state") {
        const order = ["At lowest tracked price", "Above lowest tracked price"];
        return order.indexOf(left.label) - order.indexOf(right.label);
      }
      return left.label.localeCompare(right.label);
    }

    function renderHero(payload) {
      const cards = [
        ["Tracked items", String(payload.productCount)],
        ["Last update", formatDate(payload.latestCheckedAt)],
        ["Source", "history.json"]
      ];

      heroStats.innerHTML = cards.map(([label, value]) => `
        <div class="hero-stat">
          <span class="hero-stat-label">${label}</span>
          <span class="hero-stat-value">${value}</span>
        </div>
      `).join("");
    }

    function renderProductCard(product) {
      const current = formatMoney(product.currentPriceValue, product.currency);
      const lowest = formatMoney(product.lowestPriceValue, product.currency);
      const gap = product.gapFromLowValue;
      const atLow = product.isAtLowestPrice;
      const savingsLabel = atLow
        ? "At lowest tracked price"
        : `${formatMoney(gap, product.currency)} above low`;

      return `
        <article class="card">
          <div class="card-top">
            <h2><a href="${product.url}" target="_blank" rel="noreferrer">${product.name}</a></h2>
            <span class="pill">${product.entryCount} ${product.entryCount === 1 ? "point" : "points"}</span>
          </div>
          <div class="stats">
            <div class="stat">
              <span class="stat-label">Current price</span>
              <span class="stat-value">${current}</span>
            </div>
            <div class="stat">
              <span class="stat-label">Lowest price</span>
              <span class="stat-value">${lowest}</span>
            </div>
          </div>
          <div class="trend">${savingsLabel}</div>
          <div class="graph-wrap">
            <div class="graph-head">
              <span>${formatMoney(product.lowestPriceValue, product.currency)} low</span>
              <span>${formatMoney(product.highestPriceValue, product.currency)} high</span>
            </div>
            ${buildSparkline(product.entries)}
          </div>
          <div class="meta">
            Store: ${product.store}<br>
            Last checked ${formatDate(product.lastCheckedAt)}.<br>
            <a href="${product.url}" target="_blank" rel="noreferrer">Open product page</a>
          </div>
        </article>
      `;
    }

    function renderProducts() {
      const payload = uiState.payload;
      if (!payload || !payload.products.length) {
        emptyState.hidden = false;
        productGroups.innerHTML = "";
        return;
      }

      emptyState.hidden = true;

      const sortedProducts = [...payload.products].sort((left, right) => compareProducts(left, right, uiState.sortBy));
      const groups = buildGroups(sortedProducts, uiState.groupBy).sort((left, right) => compareGroups(left, right, uiState.groupBy));

      productGroups.innerHTML = groups.map((group) => `
        <section class="group-section">
          ${uiState.groupBy === "none" ? "" : `
            <div class="group-header">
              <h2 class="group-title">${group.label}</h2>
              <div class="group-meta">${group.items.length} ${group.items.length === 1 ? "item" : "items"}</div>
            </div>
          `}
          <div class="grid">
            ${group.items.map((product) => renderProductCard(product)).join("")}
          </div>
        </section>
      `).join("");

      status.textContent = `Loaded ${payload.productCount} tracked items. Grouped by ${groupBySelect.selectedOptions[0].text.toLowerCase()} and sorted by ${sortBySelect.selectedOptions[0].text.toLowerCase()}.`;
    }

    function bindControls() {
      groupBySelect.addEventListener("change", () => {
        uiState.groupBy = groupBySelect.value;
        renderProducts();
      });

      sortBySelect.addEventListener("change", () => {
        uiState.sortBy = sortBySelect.value;
        renderProducts();
      });
    }

    async function loadHistory() {
      try {
        const response = await fetch("./history.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`Request failed with ${response.status}`);
        }

        const history = await response.json();
        const payload = buildPayload(history);
        uiState.payload = payload;
        renderHero(payload);
        controls.hidden = false;
        renderProducts();
      } catch (error) {
        status.classList.add("error");
        status.textContent = `Could not load history.json: ${error.message}`;
      }
    }

    bindControls();
    loadHistory();
  </script>
</body>
</html>
